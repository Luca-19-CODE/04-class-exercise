<section class="contactSection">
    <div class="contactContainer">
        <div class="contactInfo">
                <h1>Contact us</h1>

                <p>If you would like to learn more about StudySpace or attend one of our student productivity workshops, please get in touch with us.</p>
                <p>You can also visit our campus location shown on this map:</p>
            
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3591.078698289101!2d28.28297151114535!3d-25.833951948902925!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1e9567702589e28d%3A0x2a1b768715b91a80!2s5%20Gomdoring%20Pl%2C%20Moreleta%20Park%2C%20Pretoria%2C%200044!5e0!3m2!1sen!2sza!4v1773837844903!5m2!1sen!2sza" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            
            </div>
        <div class="ContactForm">

            <form>

                <div class="FormalElement">
                    <label for="name">Full name</label>
                    <input type="text" id="name" name="Name" placeholder="Enter your name" required/>
                
                </div>
                <div class="FormalElement">
                    <label for="Email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required/>
                </div>

                <div class="FormalElement">
                    <label for="students">Number of Students</label>
                    <input type="number" id="student" name="student" placeholder="Enter your email" required/>
                </div> 
                
                <div class="FormalElement">
                    <label for="visit">Preferred visit Date</label>
                    <input type="date" id="student" name="visit" />
                    
                 <div class="FormalElement">
                    <label for="topic"> name topic of interest" </label>
                    <select id="topic" name="topic">
                        <option value="">select an option</option>
                        <option value="Productivity">Student productivity</option>
                        <option value="organisation">Organisational tools</option>
                        <option value="workshops">workshops</option>
                    </select>
                    </div>        

                    <div class="FormalElement">
                        <label for="message">message</label>
                        <textarea id="message" name="message" rows="4"
                        placeholder="write your message here..." required></textarea>
                        
                    </div>

                    <button type="submit">submit</button>
                

            </form>

    </div>

</section>
